services:
  # Backend (Express)
  - type: web
    name: imaginex-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build:server
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          name: imaginex-backend
          property: port
      - key: DATABASE_URL
        fromService:
          name: imaginex-db
          property: connectionString
    autoDeploy: true

  # Frontend (Vite)
  - type: static
    name: imaginex-frontend
    buildCommand: npm ci && npm run build:client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://{{service.imaginex-backend.url}}
    autoDeploy: true

databases:
  - name: imaginex-db
    plan: free
    databaseName: imaginex
    user: imaginex_user
    password: ${POSTGRES_PASSWORD}
